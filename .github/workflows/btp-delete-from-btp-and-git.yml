name: (Dev) Delete from BTP DEV/TST & GIT

on:
  workflow_dispatch:
    inputs:
      id:
        description: "ID"
        required: true
        type: string
      mode:
        description: "Mode IntegrationPackages/PartnerDirectory"
        required: true
        type: choice
        options:
          - IntegrationPackages
          - PartnerDirectory
      commit-message:
        description: "JIRA Story / SNOW Incident"
        required: true
        type: string
      delete:
        description: "Confirm to Delete (write DELETE)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  initialize-dev:
    name: Authorize & Read Environment Variables for DEV
    if: ${{ inputs.delete == 'DELETE' }}
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: DEV
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      btp-eic-runtimes: ${{ steps.export.outputs.btp-eic-runtimes }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: ${{ vars.GIT_GITHUB_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_GITHUB_APP_ID }}
          private-key: ${{ secrets.GIT_GITHUB_APP_PRIVATE_KEY }}

      - name: Resolve org token
        id: org-token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PAT_TOKEN: ${{ secrets.GIT_ORG_TOKEN }}
        run: |
          TOKEN="${APP_TOKEN:-$PAT_TOKEN}"
          [ -z "$TOKEN" ] && echo "🛑 No org token: set GIT_GITHUB_APP_ID + GIT_GITHUB_APP_PRIVATE_KEY, or set GIT_ORG_TOKEN" && exit 1
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Check team authorization
        uses: miyasuta-org/cicd-actions-for-sap-integration-suite/.github/actions/check-team-authorization@main
        with:
          team-slug: ${{ vars.BTP_DEV_TEAM_SLUG }}
          github-token: ${{ steps.org-token.outputs.token }}

      - name: Export vars
        id: export
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "btp-eic-runtimes=${{ vars.BTP_EIC_RUNTIMES }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT

  delete-on-dev:
    needs: initialize-dev
    name: Delete from DEV
    uses: miyasuta-org/cicd-actions-for-sap-integration-suite/.github/workflows/delete-upload.yml@main
    with:
      workflow-ref: main
      target-env: DEV
      source-ref: development
      integrationpackages-delete-ids: ${{ github.event.inputs.mode == 'IntegrationPackages' && github.event.inputs.id || '' }}
      partnerdirectory-delete-ids: ${{ github.event.inputs.mode == 'PartnerDirectory' && github.event.inputs.id || '' }}
      btp-api-user: ${{ needs.initialize-dev.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.initialize-dev.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.initialize-dev.outputs.btp-token-url }}
      btp-api-url: ${{ needs.initialize-dev.outputs.btp-api-url }}
      btp-eic-runtimes: ${{ needs.initialize-dev.outputs.btp-eic-runtimes }}
      git-cicd-orgrepo: ${{ needs.initialize-dev.outputs.git-cicd-orgrepo }}
    secrets:
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      GIT_CICD_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}

  initialize-tst:
    needs: [delete-on-dev]
    name: Read Environment Variables for TST
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: TST
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      btp-eic-runtimes: ${{ steps.export.outputs.btp-eic-runtimes }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
    steps:
      - name: Export vars
        id: export
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "btp-eic-runtimes=${{ vars.BTP_EIC_RUNTIMES }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT

  delete-on-tst:
    needs: initialize-tst
    name: Delete from TST
    uses: miyasuta-org/cicd-actions-for-sap-integration-suite/.github/workflows/delete-upload.yml@main
    with:
      workflow-ref: main
      target-env: TST
      source-ref: development
      integrationpackages-delete-ids: ${{ github.event.inputs.mode == 'IntegrationPackages' && github.event.inputs.id || '' }}
      partnerdirectory-delete-ids: ${{ github.event.inputs.mode == 'PartnerDirectory' && github.event.inputs.id || '' }}
      btp-api-user: ${{ needs.initialize-tst.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.initialize-tst.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.initialize-tst.outputs.btp-token-url }}
      btp-api-url: ${{ needs.initialize-tst.outputs.btp-api-url }}
      btp-eic-runtimes: ${{ needs.initialize-tst.outputs.btp-eic-runtimes }}
      git-cicd-orgrepo: ${{ needs.initialize-tst.outputs.git-cicd-orgrepo }}
    secrets:
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      GIT_CICD_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}

  delete-from-git:
      needs: [delete-on-tst, initialize-tst]
      name: Delete from GIT
      uses: miyasuta-org/cicd-actions-for-sap-integration-suite/.github/workflows/delete-dir-from-git.yml@main
      with:
        workflow-ref: main
        id: ${{ inputs.id }}
        mode: ${{ inputs.mode }}
        source-ref: development
        commit-message: ${{ inputs.commit-message }}
        git-cicd-orgrepo: ${{ needs.initialize-tst.outputs.git-cicd-orgrepo }}
      secrets:
        GIT_CICD_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
        GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}


