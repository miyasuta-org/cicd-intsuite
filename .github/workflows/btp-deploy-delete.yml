name: (Admin) BTP Deploy/Delete Manager

on:
  workflow_dispatch:
    inputs:
      upload-ids:
        description: "Comma-separated list of IDs to upload"
        required: false
        type: string
      delete-ids:
        description: "Comma-separated list of IDs to delete"
        required: false
        type: string		
      mode:
        description: "Mode IntegrationPackages/PartnerDirectory"
        required: true
        type: choice
        options:
          - IntegrationPackages
          - PartnerDirectory
      source-ref:
        description: "GIT Source Reference"
        required: true
        type: string
      attach-zip-only:
        description: "Only attach ZIP of Package(s)?"
        required: false
        default: "false"
        type: choice
        options:
          - false
          - true        
      target-env:
        description: "Target BTP Environment"
        required: false
        type: choice
        options:
          - ""
          - "DEV"

permissions:
  contents: write

jobs:
  initialize:
    name: Authorize & Read Environment Variables for ${{ github.event.inputs.target-env }}
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: ${{ inputs.target-env }}
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      btp-eic-runtimes: ${{ steps.export.outputs.btp-eic-runtimes }}
      btp-eic-url-template: ${{ steps.export.outputs.btp-eic-url-template }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: ${{ vars.GIT_GITHUB_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_GITHUB_APP_ID }}
          private-key: ${{ secrets.GIT_GITHUB_APP_PRIVATE_KEY }}

      - name: Resolve org token
        id: org-token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PAT_TOKEN: ${{ secrets.GIT_ORG_TOKEN }}
        run: |
          TOKEN="${APP_TOKEN:-$PAT_TOKEN}"
          [ -z "$TOKEN" ] && echo "🛑 No org token: set GIT_GITHUB_APP_ID + GIT_GITHUB_APP_PRIVATE_KEY, or set GIT_ORG_TOKEN" && exit 1
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Check team authorization
        uses: miyasuta-org/cicd-actions-for-sap-integration-suite/.github/actions/check-team-authorization@main
        with:
          team-slug: ${{ vars.BTP_ADMIN_TEAM_SLUG }}
          github-token: ${{ steps.org-token.outputs.token }}

      - name: Export vars
        id: export
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "btp-eic-runtimes=${{ vars.BTP_EIC_RUNTIMES }}" >> $GITHUB_OUTPUT
          echo "btp-eic-url-template=${{ vars.BTP_EIC_URL_TEMPLATE }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT

  btp-process-ids:
    needs: [initialize]
    name: Process ${{ github.event.inputs.mode }}
    uses: miyasuta-org/cicd-actions-for-sap-integration-suite/.github/workflows/delete-upload.yml@main
    with:
      workflow-ref: main
      target-env: ${{ github.event.inputs.target-env }}
      source-ref: ${{ github.event.inputs.source-ref }}
      integrationpackages-delete-ids: ${{ github.event.inputs.mode == 'IntegrationPackages' && github.event.inputs.delete-ids || '' }}
      integrationpackages-upload-ids: ${{ github.event.inputs.mode == 'IntegrationPackages' && github.event.inputs.upload-ids || '' }}
      partnerdirectory-delete-ids: ${{ github.event.inputs.mode == 'PartnerDirectory' && github.event.inputs.delete-ids || '' }}
      partnerdirectory-upload-ids: ${{ github.event.inputs.mode == 'PartnerDirectory' && github.event.inputs.upload-ids || '' }}
      attach-zip-only: ${{ github.event.inputs.attach-zip-only }}
      btp-api-user: ${{ needs.initialize.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.initialize.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.initialize.outputs.btp-token-url }}
      btp-api-url: ${{ needs.initialize.outputs.btp-api-url }}
      btp-eic-runtimes: ${{ needs.initialize.outputs.btp-eic-runtimes }}
      btp-eic-url-template: ${{ needs.initialize.outputs.btp-eic-url-template }}
      git-cicd-orgrepo: ${{ needs.initialize.outputs.git-cicd-orgrepo }}
      enable-set-log-level: ${{ vars.BTP_SET_LOG_LEVEL != 'false' }}
    secrets:
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      GIT_CICD_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
